<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact AutoGiant Motors</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/autogiant-motors-contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <section id="contact-us" class="contact-section">
        <div class="container">
            <h2 class="section-title">Get in Touch</h2>
            <div class="contact-grid">
                <div class="contact-info">
                    <h3>Our Location</h3>
                    <p><i class="fas fa-map-marker-alt"></i> AutoGiant Motors, Kajiado Rd, Mlolongo, Kenya</p>
                    <p><i class="fas fa-phone-alt"></i> <a href="tel:+254712345678">+254 712 345678</a></p>
                    <p><i class="fas fa-envelope"></i> <a href="mailto:info@autogiant.com">info@autogiant.com</a></p>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1994.4984102657376!2d36.9800030514937!3d-1.428383921160475!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f059c2f0f0f0f%3A0x8f2d9d8f2d9d8f2d!2sMlolongo%2C%20Kenya!5e0!3m2!1sen!2ske!4v1678912345678!5m2!1sen!2ske" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    <p class="directions-link"><a href="https://maps.app.goo.gl/YourGoogleMapsLink" target="_blank" rel="noopener">Get Directions <i class="fas fa-external-link-alt"></i></a></p>
                </div>
                <div class="contact-form">
                    <h3>Send Us a Message</h3>
                    <form>
                        <label for="contact-name">Name</label>
                        <input type="text" id="contact-name" name="name" required>

                        <label for="contact-email">Email</label>
                        <input type="email" id="contact-email" name="email" required>

                        <label for="contact-phone">Phone (Optional)</label>
                        <input type="tel" id="contact-phone" name="phone">

                        <label for="contact-message">Message</label>
                        <textarea id="contact-message" name="message" rows="6" required></textarea>

                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
                <div class="contact-hours">
                    <h3>Business Hours</h3>
                    <ul>
                        <li><i class="far fa-clock"></i> Monday - Friday: 9:00 AM - 6:00 PM</li>
                        <li><i class="far fa-clock"></i> Saturday: 10:00 AM - 4:00 PM</li>
                        <li><i class="far fa-clock"></i> Sunday: Closed</li>
                    </ul>
                    <div class="social-links">
                        <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                        <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                        <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
